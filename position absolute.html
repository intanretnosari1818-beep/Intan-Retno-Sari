<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            position: relative;
            width: 620px;
            height: 620px;
            background-color: lightgray;
        }
        .box1 {
            position: absolute;
            right: 10px;
            bottom: 10px;
            background-color: coral;
            width: 100px;
            height: 100px;
        }
        .box2 {
            position: absolute;
            left: 10px;
            top: 10px;
            background-color: lightgreen;
            width: 100px;
            height: 100px;
        }
        .box3 {
            position: absolute;
            right: 10px;
            top: 10px;
            background-color: violet;
            width: 100px;
            height: 100px;
        }
        .box4 {
            position: absolute;
            left: 10px;
            bottom: 10px;
            background-color: gold;
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
    </div>
</body>
</html>
